<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trabalhando com imagens</title>
</head>

<body>
    <h1>trabalhando com imagens</h1>
    <p>o uso da tag <b>IMG</b>e os atributos<b>
        src</b> e <b>alt</b>.</p>


<p>
<!-- tag <img> insere imagem no fluxo do conteudo  -->
    <img src="img/gatopixelado.png" alt="gato pixelado">
<!-- src:e o caminho para o arquivo de imagem 
 alt: texto alternativo para acessibilidade e 
 SEo.
 obs: recomendaado evitar imagens sem alt    -->
</p>

<figure>
    <!-- <figure> tag que agrupa a imagem com a legenda sematica-->
    <img src="img/pixelcat2.png" alt="gato laranga pixelado">
    <figcaption>
        imagem de gato laranja super fofo
    </figcaption>
</figure>
</body>

</html>
